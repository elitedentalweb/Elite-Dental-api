service: elite-dental-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs22.x
  profile: eliteDental
  region: us-east-1

custom:
  prune: # автоматичне видалення старих версій
    automatic: true
    number: 3 # залишати останні 3 версії

functions:
  api:
    handler: dist/index.handler
    events:
      - httpApi: '*'
